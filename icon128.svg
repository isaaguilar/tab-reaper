<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Dark circular background -->
  <circle cx="64" cy="64" r="60" fill="#1a1a2e"/>
  <circle cx="64" cy="64" r="58" fill="none" stroke="#0f3460" stroke-width="2"/>

  <!-- Scythe blade (reaper theme) -->
  <path d="M 38 30 Q 28 50, 40 72 Q 50 88, 72 92 Q 60 82, 56 68 Q 52 54, 58 38 Q 50 32, 38 30 Z"
        fill="#53d769" opacity="0.9"/>

  <!-- Scythe handle -->
  <line x1="72" y1="92" x2="96" y2="50" stroke="#7a8bb5" stroke-width="4" stroke-linecap="round"/>

  <!-- Small "X" marks representing closed tabs -->
  <g stroke="#e74c3c" stroke-width="2.5" stroke-linecap="round" opacity="0.8">
    <line x1="82" y1="72" x2="90" y2="80"/>
    <line x1="90" y1="72" x2="82" y2="80"/>
  </g>
  <g stroke="#e74c3c" stroke-width="2" stroke-linecap="round" opacity="0.5">
    <line x1="92" y1="58" x2="98" y2="64"/>
    <line x1="98" y1="58" x2="92" y2="64"/>
  </g>
  <g stroke="#e74c3c" stroke-width="1.5" stroke-linecap="round" opacity="0.35">
    <line x1="78" y1="88" x2="83" y2="93"/>
    <line x1="83" y1="88" x2="78" y2="93"/>
  </g>
</svg>
